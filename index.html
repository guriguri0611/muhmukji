<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />

<style>
  :root{
    --bg:#FFF7F0; --card:#FFFFFF; --ink:#2B2422; --sub:#9A8F88; --line:#F1E7DE;
    --primary:#FF6B4A; --primarySoft:#FFE7E0; --yellow:#FFC24B; --yellowSoft:#FFF2D6;
    --green:#34C759; --shadow:0 8px 24px rgba(255,107,74,0.12);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Segoe UI',sans-serif;
    background:#EFE7DF; color:var(--ink);
    display:flex; justify-content:center; align-items:center; min-height:100%;
  }

  /* ===== 데스크톱: 아이폰 프레임 ===== */
  #device{
    width:390px; height:800px; background:#000; border-radius:54px; padding:11px;
    box-shadow:0 30px 60px rgba(0,0,0,.35); position:relative;
  }
  #screen{
    width:100%; height:100%; background:var(--bg); border-radius:44px;
    overflow:hidden; position:relative; display:flex; flex-direction:column;
  }
  #island{position:absolute; top:12px; left:50%; transform:translateX(-50%);
    width:110px; height:30px; background:#000; border-radius:999px; z-index:30;}
  #statusbar{display:flex; justify-content:space-between; align-items:center;
    padding:16px 26px 6px; font-size:13px; font-weight:700;}
  #content{flex:1; overflow-y:auto; padding:0 20px 96px; -webkit-overflow-scrolling:touch;}

  /* ===== 실제 폰 / 설치(PWA) / 좁은 화면: 풀스크린 ===== */
  body.fullscreen{display:block; background:var(--bg);}
  body.fullscreen #device{width:100%; height:100dvh; background:transparent; border-radius:0; padding:0; box-shadow:none;}
  body.fullscreen #screen{border-radius:0;}
  body.fullscreen #island{display:none;}
  body.fullscreen #statusbar{display:none;}
  body.fullscreen #content{padding-top:env(safe-area-inset-top, 12px);}
  body.fullscreen #tabbar{padding-bottom:calc(env(safe-area-inset-bottom, 10px) + 10px);}

  /* ===== 공통 컴포넌트 ===== */
  h1{font-size:28px; font-weight:900; margin:0; line-height:1.25;}
  h2{margin:0;}
  .muted{color:var(--sub);}
  .row{display:flex; flex-wrap:wrap; gap:8px;}
  .sectitle{display:flex; align-items:baseline; gap:8px; margin:22px 4px 12px;}
  .sectitle h3{font-size:16px; font-weight:800; margin:0;}
  .sectitle span{font-size:12px; color:var(--sub);}

  .chip{padding:9px 14px; border-radius:999px; border:1.5px solid var(--line);
    background:var(--card); color:var(--ink); font-size:14px; font-weight:500;
    transition:all .15s ease; cursor:pointer;}
  .chip.on{border-color:var(--primary); background:var(--primary); color:#fff;
    font-weight:700; box-shadow:0 4px 12px rgba(255,107,74,.28);}

  .btn{border:none; border-radius:18px; font-weight:800; cursor:pointer;}
  .btn-primary{background:var(--primary); color:#fff; box-shadow:0 8px 18px rgba(255,107,74,.35);}
  .btn-soft{background:var(--yellowSoft); color:#A9701B; border:1.5px solid var(--yellow);}
  .btn-ghost{background:var(--card); color:var(--ink); border:1.5px solid var(--line);}

  .bubble{background:var(--card); border-radius:18px 18px 18px 4px; padding:10px 14px;
    box-shadow:var(--shadow); font-size:14px; font-weight:600;}

  .card{background:var(--card); border-radius:26px; padding:24px; box-shadow:var(--shadow);
    border:1px solid var(--line);}
  .tag{display:inline-block; padding:5px 12px; border-radius:999px; background:var(--primarySoft);
    color:var(--primary); font-size:12px; font-weight:800;}
  .simtag{padding:6px 11px; border-radius:999px; background:var(--bg); color:var(--ink);
    font-size:13px; font-weight:600; border:1px solid var(--line);}

  .setrow{display:flex; align-items:center; gap:12px; background:var(--card);
    border-radius:18px; padding:15px 16px; border:1px solid var(--line);}
  .toggle{width:50px; height:30px; border-radius:999px; border:none; padding:3px;
    background:#E4DAD1; cursor:pointer; display:flex; justify-content:flex-start; transition:background .2s;}
  .toggle.on{background:var(--green); justify-content:flex-end;}
  .toggle .knob{width:24px; height:24px; border-radius:50%; background:#fff;
    box-shadow:0 1px 3px rgba(0,0,0,.2);}

  input.txt{flex:1; padding:13px 14px; border-radius:14px; border:1.5px solid var(--line);
    font-size:14px; outline:none; background:var(--card); color:var(--ink);}
  input.txt:focus{border-color:var(--primary);}

  .histcard{display:flex; align-items:center; gap:14px; background:var(--card);
    border-radius:18px; padding:14px 16px; border:1px solid var(--line);}
  .histicon{width:42px; height:42px; border-radius:12px; background:var(--primarySoft);
    display:flex; align-items:center; justify-content:center; font-size:20px;}

  #tabbar{position:absolute; bottom:0; left:0; right:0;
    background:rgba(255,247,240,.92); backdrop-filter:blur(12px);
    border-top:1px solid var(--line); display:flex; padding:8px 8px 24px;}
  .tabbtn{flex:1; background:none; border:none; cursor:pointer; display:flex;
    flex-direction:column; align-items:center; gap:3px; padding:4px 0;}
  .tabbtn .ic{font-size:21px; opacity:.5; filter:grayscale(40%);}
  .tabbtn .lb{font-size:11px; font-weight:600; color:var(--sub);}
  .tabbtn.on .ic{opacity:1; filter:none;}
  .tabbtn.on .lb{font-weight:800; color:var(--primary);}
</style>
</head>

  try{ const h=localStorage.getItem("muhmukji:history"); if(h) S.history=JSON.parse(h);}catch(e){}

}

  try{ localStorage.setItem("muhmukji:history",JSON.stringify(S.history));}catch(e){}

function pickMenu(random){
  let pool = MENUS.slice();
  if(!random){
    if(S.mood) pool=pool.filter(m=>m.mood.includes(S.mood));
    if(S.category && S.category!=="상관없음") pool=pool.filter(m=>m.category===S.category);
    if(S.type && S.type!=="상관없음") pool=pool.filter(m=>m.type.includes(S.type));
    if(S.budget==="8000") pool=pool.filter(m=>m.price<=8000);
    else if(S.budget==="15000") pool=pool.filter(m=>m.price<=15000);
    if((!S.category||S.category==="상관없음") && S.settings.prefCats.length){
      const pref=pool.filter(m=>S.settings.prefCats.includes(m.category));
      if(pref.length) pool=pref;
    }
  }
  if(!S.settings.spicyOk) pool=pool.filter(m=>!m.spicy);
  if(S.settings.dislikes.length) pool=pool.filter(m=>!S.settings.dislikes.some(d=>d&&m.name.includes(d)));
  if(S.settings.excludeRecent && S.history.length){
    const recent=S.history.slice(0,5).map(h=>h.name);
    const f=pool.filter(m=>!recent.includes(m.name));
    if(f.length) pool=f;
  }
  if(!pool.length) return null;
  return pool[Math.floor(Math.random()*pool.length)];
}
function buildReason(menu, mood){
  const base = mood || menu.mood[0];
  const tail = {"든든한":"오늘 저녁 든든하게 채우기 좋아.","가벼운":"부담 없이 가볍게 먹기 딱 좋아.","매운":"얼큰하게 스트레스 풀기 좋아.","따뜻한":"따뜻하게 속 데우기 좋아.","시원한":"시원하게 입맛 살리기 좋아.","깔끔한":"깔끔하게 마무리하기 좋아."}[base] || "저녁 메뉴로 잘 어울려.";
  return `${base} 느낌이라 ${tail}`;
}
function todayLabel(){ const d=new Date(); return `${d.getMonth()+1}월 ${d.getDate()}일`; }

/* ---------- 액션 (전역) ---------- */
function setTab(t){ S.tab=t; render(); }
function toggleSel(key,val){ S[key]=(S[key]===val?null:val); render(); }
function recommend(random){
  const m=pickMenu(random);
  if(!m){ S.noMatch=true; S.result=null; } else { S.result={menu:m, reason:buildReason(m, random?null:S.mood)}; S.noMatch=false; }
  S.tab="result"; render();
}
function saveEaten(){
  if(!S.result) return;
  S.history=[{date:todayLabel(),name:S.result.menu.name}, ...S.history].slice(0,50);
  save();
  S._flash=true; render();
  setTimeout(()=>{ S._flash=false; render(); },1500);
}
function addDislike(){
  const v=(S.dislikeInput||"").trim();
  if(!v||S.settings.dislikes.includes(v)){ S.dislikeInput=""; render(); return; }
  S.settings.dislikes.push(v); S.dislikeInput=""; save(); render();
}
function removeDislike(d){ S.settings.dislikes=S.settings.dislikes.filter(x=>x!==d); save(); render(); }
function togglePref(c){
  const i=S.settings.prefCats.indexOf(c);
  if(i>=0) S.settings.prefCats.splice(i,1); else S.settings.prefCats.push(c);
  save(); render();
}
function toggleSetting(key){ S.settings[key]=!S.settings[key]; save(); render(); }

/* ---------- 화면 렌더 ---------- */
function chips(list, key){
  return `<div class="row">`+list.map(([k,e])=>{
    const label = key==="budget" ? `💸 ${e}` : `${e} ${k}`;
    const on = S[key]===k ? "on":"";
    return `<button class="chip ${on}" onclick="toggleSel('${key}','${k}')">${label}</button>`;
  }).join("")+`</div>`;
}

function homeScreen(){
  const cnt=[S.mood,S.category,S.type,S.budget].filter(Boolean).length;
  return `
  <div style="display:flex;align-items:center;gap:12px;margin-top:8px;">
    ${mascot(74)}
    <div class="bubble" style="color:var(--ink);">오늘 뭐 먹을지 같이 골라보자!</div>
  </div>
  <h1 style="margin:20px 4px 2px;">오늘 저녁<br>뭐 먹지? 🍽️</h1>
  <p class="muted" style="font-size:13px;margin:0 4px;">조건을 골라봐. ${cnt>0?`${cnt}개 선택됨`:"안 골라도 랜덤 추천 가능해!"}</p>

  <div class="sectitle"><h3>기분</h3><span>하나만 골라줘</span></div>${chips(MOODS,"mood")}
  <div class="sectitle"><h3>음식 카테고리</h3></div>${chips(CATS,"category")}
  <div class="sectitle"><h3>식사 방식</h3></div>${chips(TYPES,"type")}
  <div class="sectitle"><h3>예산</h3></div>${chips(BUDGETS,"budget")}

  <div style="display:flex;gap:10px;margin-top:28px;">
    <button class="btn btn-primary" style="flex:1;padding:16px;font-size:16px;" onclick="recommend(false)">메뉴 추천받기</button>
    <button class="btn btn-soft" style="padding:16px 18px;font-size:15px;white-space:nowrap;" onclick="recommend(true)">🎲 랜덤</button>
  </div>`;
}

function resultScreen(){
  if(S.noMatch){
    return `<div style="padding-top:24px;text-align:center;">
      <div style="margin-top:30px;">${mascot(96,"sleepy")}</div>
      <h2 style="font-size:19px;font-weight:800;margin-top:16px;">조건에 맞는 메뉴가 없어요</h2>
      <p class="muted" style="font-size:14px;line-height:1.6;">조건을 조금 줄여볼까요?</p>
      <button class="btn btn-primary" style="margin-top:18px;padding:14px 24px;font-size:15px;" onclick="setTab('home')">조건 다시 고르기</button>
    </div>`;
  }
  if(!S.result){
    return `<div style="padding-top:40px;text-align:center;">
      ${mascot(96)}
      <h2 style="font-size:18px;font-weight:800;margin-top:16px;">아직 추천받은 메뉴가 없어</h2>
      <p class="muted" style="font-size:14px;">홈에서 조건 고르고 추천받아줘!</p>
      <button class="btn btn-primary" style="margin-top:16px;padding:14px 24px;font-size:15px;" onclick="setTab('home')">홈으로 가기</button>
    </div>`;
  }
  const {menu,reason}=S.result;
  const sims=menu.similar.map(s=>`<span class="simtag">${s}</span>`).join("");
  const saveLabel = S._flash ? "✓ 저장됨!" : "오늘 먹은 메뉴로 저장";
  const saveBg = S._flash ? "var(--green)" : "var(--primary)";
  return `
  <div style="display:flex;align-items:center;gap:10px;margin:16px 0 14px;">
    ${mascot(56,"wink")}
    <div class="bubble" style="border-radius:16px 16px 16px 4px;font-weight:700;">이거 어때? 😋</div>
  </div>
  <div class="card">
    <span class="tag">${menu.category}</span>
    <h2 style="font-size:32px;font-weight:900;margin:12px 0 4px;">${menu.name}</h2>
    <p style="font-size:18px;font-weight:800;color:var(--primary);margin:0;">약 ${menu.price.toLocaleString()}원</p>
    <div style="height:1px;background:var(--line);margin:18px 0;"></div>
    <p style="font-size:12px;font-weight:800;color:var(--sub);margin:0 0 4px;">추천 이유</p>
    <p style="font-size:14.5px;line-height:1.55;margin:0;">${reason}</p>
    <p style="font-size:12px;font-weight:800;color:var(--sub);margin:16px 0 8px;">비슷한 메뉴</p>
    <div class="row">${sims}</div>
  </div>
  <div style="display:flex;gap:10px;margin-top:18px;">
    <button class="btn btn-ghost" style="flex:1;padding:15px;font-size:15px;" onclick="recommend(false)">🔄 다시 추천</button>
    <button class="btn" style="flex:1.3;padding:15px;font-size:15px;color:#fff;background:${saveBg};" onclick="saveEaten()">${saveLabel}</button>
  </div>`;
}

function historyScreen(){
  let body;
  if(!S.history.length){
    body=`<div style="text-align:center;padding-top:50px;">
      ${mascot(90,"sleepy")}
      <p style="font-size:15px;font-weight:700;margin-top:14px;">아직 먹은 메뉴 기록이 없어</p>
      <p class="muted" style="font-size:13px;">맛있게 먹고 추천 화면에서 저장해줘!</p></div>`;
  } else {
    body=`<div style="display:flex;flex-direction:column;gap:10px;">`+S.history.map(h=>`
      <div class="histcard"><div class="histicon">🍴</div>
        <div style="flex:1;"><p style="margin:0;font-size:15.5px;font-weight:800;">${h.name}</p>
        <p class="muted" style="margin:0;font-size:12.5px;">${h.date}</p></div></div>`).join("")+`</div>`;
  }
  return `<h1 style="font-size:26px;margin:8px 4px 4px;">먹은 기록 📒</h1>
    <p class="muted" style="font-size:13px;margin:0 4px 18px;">최근에 먹은 메뉴는 추천에서 빠질 수 있어.</p>${body}`;
}

function settingsScreen(){
  const dis = S.settings.dislikes.length
    ? `<div class="row" style="margin-top:10px;">`+S.settings.dislikes.map(d=>`<span class="tag" style="cursor:pointer;" onclick="removeDislike('${d}')">${d} ✕</span>`).join("")+`</div>` : "";
  const prefs = ["한식","중식","일식","양식"].map(c=>`<button class="chip ${S.settings.prefCats.includes(c)?'on':''}" onclick="togglePref('${c}')">${c}</button>`).join("");
  const tog=(key,title,desc)=>`<div class="setrow"><div style="flex:1;">
      <p style="margin:0;font-size:15px;font-weight:800;">${title}</p>
      <p class="muted" style="margin:2px 0 0;font-size:12.5px;">${desc}</p></div>
      <button class="toggle ${S.settings[key]?'on':''}" onclick="toggleSetting('${key}')"><span class="knob"></span></button></div>`;
  return `<h1 style="font-size:26px;margin:8px 4px 18px;">취향 설정 ⚙️</h1>
    <div class="sectitle"><h3>싫어하는 음식</h3><span>이 음식이 든 메뉴는 빼줄게</span></div>
    <div style="display:flex;gap:8px;">
      <input id="dislike" class="txt" placeholder="예: 오이, 가지" value="${(S.dislikeInput||'').replace(/"/g,'&quot;')}">
      <button class="btn btn-primary" style="padding:0 18px;font-size:14px;box-shadow:none;" onclick="addDislike()">추가</button>
    </div>${dis}
    <div class="sectitle"><h3>선호 카테고리</h3></div><div class="row">${prefs}</div>
    <p class="muted" style="font-size:12px;margin:8px 4px 0;">카테고리를 '상관없음'으로 추천받을 때 먼저 골라줄게.</p>
    <div style="margin-top:26px;display:flex;flex-direction:column;gap:12px;">
      ${tog("spicyOk","매운 음식 가능","끄면 매운 메뉴는 추천에서 빠져요")}
      ${tog("excludeRecent","최근 먹은 메뉴 제외","최근 먹은 메뉴는 가능하면 다시 추천 안 해요")}
    </div>`;
}

function tabbar(){
  const items=[["home","홈","🏠"],["result","추천","🍽️"],["history","기록","📒"],["settings","설정","⚙️"]];
  return items.map(([k,l,ic])=>`<button class="tabbtn ${S.tab===k?'on':''}" onclick="setTab('${k}')"><span class="ic">${ic}</span><span class="lb">${l}</span></button>`).join("");
}

function render(){
  const content=document.getElementById("content");
  const prevScroll=content.scrollTop;
  let html="";
  if(S.tab==="home") html=homeScreen();
  else if(S.tab==="result") html=resultScreen();
  else if(S.tab==="history") html=historyScreen();
  else html=settingsScreen();
  content.innerHTML=html;
  document.getElementById("tabbar").innerHTML=tabbar();
  // 같은 탭 재렌더 시 스크롤 유지
  content.scrollTop = prevScroll;
  // dislike 입력값을 상태에 반영 (포커스 잃지 않도록 재렌더 없이)
  const di=document.getElementById("dislike");
  if(di){
    di.addEventListener("input",e=>{ S.dislikeInput=e.target.value; });
    di.addEventListener("keydown",e=>{ if(e.key==="Enter") addDislike(); });
  }
}

/* 풀스크린/프레임 모드 결정 */
function applyMode(){
  const standalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
  const narrow = window.innerWidth < 500;
  document.body.classList.toggle("fullscreen", standalone || narrow);
}
window.addEventListener("resize", applyMode);

load();
applyMode();
render();
</script>
</body>
</html>
